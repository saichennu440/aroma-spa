function createCard(service){

    const prices =
    service.variants.map((v,index)=>`

        <label class="price-option">

            <input
            type="radio"
            name="${service.name}"
            value="${v.duration}|${v.price}"
            ${index===0 ? "checked" : ""}>

            <div class="price-card">
                <strong>${v.duration} Min</strong>
                <br>
                ₹${v.price}
            </div>

        </label>

    `).join("");

    return `

        <div class="swiper-slide">

            <div class="service-card ${service.category === 'pedicure' ? 'pedicure-card' : ''}">

                <img src="${service.image}"
                     loading="lazy">

                <div class="content">

                    <h3 class="${
                        service.name.includes("Pedicure") ||
                        service.name.includes("Cucumber") ||
                        service.name.includes("Watermelon")
                            ? "pedicure-title"
                            : ""
                    }">
                        ${service.name}
                    </h3>

                    <p>${service.description}</p>

                    <div class="prices-grid">
                        ${prices}
                    </div>

                    <button
                        class="whatsapp"
                        onclick="ExploreService('${service.name}')">
                        Explore On WhatsApp
                    </button>

                </div>

            </div>

        </div>

    `;
}

function renderServices(containerId,services){

    document.getElementById(containerId)
    .innerHTML =
    services
    .map(createCard)
    .join("");
}

function ExploreService(serviceName){

    const selected =
    document.querySelector(
    `input[name="${serviceName}"]:checked`
    );

    const [duration,price] =
    selected.value.split("|");

    const message =

`Hello Aroma Spa,

I would like to Explore:

Service: ${serviceName}
Duration: ${duration} Minutes
Price: ₹${price}

Please share available slots.

Thank you.`;

    window.open(
    `https://wa.me/919318629318?text=${encodeURIComponent(message)}`,
    "_blank"
    );
}
